name: Build
on: [push, pull_request]
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest, windows-latest]
        php-versions: ['8.1', '8.2', '8.3', '8.4', '8.5']
    name: PHP ${{ matrix.php-versions }} Test on ${{ matrix.operating-system }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup extension cache environment
        if: runner.os == 'Linux'
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: swoole
          key: ext-cache-v1

      - name: Cache extensions
        if: runner.os == 'Linux'
        uses: actions/cache@v3
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Setup PHP (Linux)
        if: runner.os == 'Linux'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: swoole
          coverage: none
          tools: composer:2.9

      - name: Setup PHP (Windows)
        if: runner.os == 'Windows'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none
          tools: composer:2.9

      # Linux: OpenLDAP via Docker
      - name: Create slapd socket directory
        if: runner.os == 'Linux'
        run: sudo mkdir -p /var/run/slapd && sudo chmod 777 /var/run/slapd

      - name: Start OpenLDAP
        if: runner.os == 'Linux'
        run: docker compose -f tests/resources/openldap/docker-compose.yml up -d --build --wait

      - name: Show OpenLDAP logs on failure
        if: failure() && runner.os == 'Linux'
        run: docker compose -f tests/resources/openldap/docker-compose.yml logs --tail=100

      - name: Add foo.com hosts entry
        if: runner.os == 'Linux'
        run: echo "127.0.0.1 foo.com" | sudo tee -a /etc/hosts

      # Windows: OpenLDAP natively in WSL1 (WSL2 is unavailable on GitHub-hosted runners —
      # they are VMs and do not support the nested Hyper-V that WSL2 requires).
      # WSL1 shares the Windows network stack, so ports bound inside WSL1 are reachable
      # from Windows as localhost.
      - name: Setup WSL Ubuntu
        if: runner.os == 'Windows'
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04

      - name: Install OpenLDAP in WSL
        if: runner.os == 'Windows'
        shell: wsl-bash {0}
        run: |
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          sudo bash tests/resources/openldap/setup.sh

      - name: Show slapd logs on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: wsl-bash {0}
        run: sudo cat /var/log/syslog | grep slapd || true

      - name: Add foo.com hosts entry (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path "C:\Windows\System32\drivers\etc\hosts" -Value "127.0.0.1 foo.com"

      - name: Get Composer Cache Directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Run Unit Tests
        run: composer run-script test-unit

      - name: Run Integration Tests
        run: composer run-script test-integration
