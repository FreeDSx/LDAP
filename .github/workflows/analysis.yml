name: Analysis
on: [push, pull_request]
jobs:
  run:
    runs-on: ubuntu-latest
    name: Code Analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup extension cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: '8.5'
          extensions: openssl,mbstring,swoole
          key: ext-cache-v1

      - name: Cache extensions
        uses: actions/cache@v3
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: openssl,mbstring,swoole
          coverage: pcov
          tools: composer:2.9

      - name: Install OpenLDAP
        run: sudo ./tests/resources/openldap/setup.sh

      - name: Get Composer Cache Directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Run Static Analysis
        run: |
          composer run-script analyse
          composer run-script analyse-tests

      - name: Run Test Coverage
        run: composer run-script --timeout=0 test-coverage

      - name: Upload Unit Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-unit.xml
          name: FreeDSx-LDAP-Unit

      - name: Upload Integration Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-integration.xml
          name: FreeDSx-LDAP-Integration
